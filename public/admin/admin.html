<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Back-office — Classement MPG</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body class="theme-purple">
  <div class="topbar">
    <span class="title">🔐 Back-office</span>
    <button class="btn-purple-outline" id="logout-btn" style="border-color:#fff;color:#fff;">Déconnexion</button>
  </div>
  <div class="container">
    <div class="admin-ongoing-card" id="ongoing-card">
      <span class="admin-ongoing-tag">Ligue en cours</span>
      <div class="admin-ongoing-title-row">
        <strong id="ongoing-card-title">Aucune ligue en cours</strong>
        <span class="admin-row-chevron" id="ongoing-card-chevron"></span>
      </div>
    </div>

    <div class="tabs">
      <button type="button" class="tab-btn active" data-tab="players">Joueurs</button>
      <button type="button" class="tab-btn" data-tab="leagues">Ligues</button>
    </div>

    <div data-panel="players">
      <div class="admin-panel-header">
        <h1 class="page-title">Joueurs</h1>
        <button type="button" class="btn-purple" id="add-player-btn">+ Ajouter un joueur</button>
      </div>
      <div id="players-list" class="admin-list"><p class="muted">Chargement…</p></div>
    </div>

    <div data-panel="leagues" style="display:none;">
      <div class="admin-panel-header">
        <h1 class="page-title">Ligues</h1>
        <button type="button" class="btn-purple" id="add-league-btn">+ Ajouter une ligue</button>
      </div>
      <div id="leagues-list" class="admin-list"><p class="muted">Chargement…</p></div>
    </div>
  </div>

  <div class="admin-drawer-backdrop" id="drawer-backdrop"></div>
  <div class="admin-drawer" id="drawer">
    <div class="admin-drawer-inner" id="drawer-content"></div>
  </div>

  <div class="admin-modal-backdrop" id="confirm-backdrop">
    <div class="admin-modal">
      <h3>Confirmer la suppression</h3>
      <p id="confirm-message"></p>
      <div class="admin-modal-actions">
        <button type="button" class="btn-purple-outline" id="confirm-cancel-btn">Annuler</button>
        <button type="button" class="btn-danger solid" id="confirm-delete-btn">Supprimer</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/admin/admin.js"></script>
</body>
</html>
