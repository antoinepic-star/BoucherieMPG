<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Back-office — Classement MPG</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="container" style="padding-top:60px;">
    <h1>🔐 Back-office</h1>
    <p class="muted">Réservé à l'administration de Classement MPG.</p>
    <div class="card">
      <form id="login-form">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" autocomplete="current-password" required />
        <div style="margin-top:16px;">
          <button type="submit" class="btn">Se connecter</button>
        </div>
        <p class="error-msg" id="error" style="display:none;"></p>
      </form>
    </div>
  </div>
  <script src="/js/api.js"></script>
  <script>
    const form = document.getElementById('login-form');
    const errorEl = document.getElementById('error');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.style.display = 'none';
      try {
        const { token } = await api.adminLogin(document.getElementById('password').value);
        setAdminToken(token);
        window.location.href = '/admin/admin.html';
      } catch (err) {
        errorEl.textContent = err.message;
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
